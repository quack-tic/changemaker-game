<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Changemaker – Das Brettspiel</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #2ecc71;
    --green-dark: #1a9c54;
    --blue: #3498db;
    --blue-dark: #2176ad;
    --orange: #e67e22;
    --orange-dark: #c0660e;
    --pink: #e84393;
    --pink-dark: #b52d73;
    --purple: #6c5ce7;
    --yellow: #f1c40f;
    --bg: #0f1923;
    --bg-light: #172a3a;
    --bg-card: #1e3548;
    --text: #ecf0f1;
    --text-dim: #7f8c8d;
    --radius: 16px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  .intro-screen {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 2rem;
    background: 
      radial-gradient(ellipse at 20% 50%, rgba(46,204,113,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 20%, rgba(52,152,219,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 80%, rgba(232,67,147,0.06) 0%, transparent 50%),
      var(--bg);
    animation: fadeIn 0.6s ease;
  }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

  .intro-screen h1 {
    font-family: 'Fredoka', sans-serif;
    font-size: clamp(2.5rem, 6vw, 4.5rem);
    font-weight: 700;
    background: linear-gradient(135deg, var(--green), var(--blue), var(--pink));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 0.5rem;
    letter-spacing: -1px;
  }

  .intro-screen .subtitle {
    font-size: 1.15rem;
    color: var(--text-dim);
    margin-bottom: 2.5rem;
    max-width: 500px;
    line-height: 1.6;
  }

  .player-setup {
    background: var(--bg-card);
    border-radius: var(--radius);
    padding: 2rem;
    width: min(90%, 460px);
    border: 1px solid rgba(255,255,255,0.06);
  }

  .player-setup h3 {
    font-family: 'Fredoka', sans-serif;
    margin-bottom: 1.2rem;
    font-size: 1.2rem;
  }

  .player-input-row {
    display: flex;
    gap: 0.75rem;
    margin-bottom: 0.75rem;
    align-items: center;
  }

  .player-input-row .dot {
    width: 18px; height: 18px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .player-input-row input {
    flex: 1;
    padding: 0.65rem 1rem;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.1);
    background: var(--bg-light);
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    font-size: 0.95rem;
    outline: none;
    transition: border 0.2s;
  }

  .player-input-row input:focus { border-color: var(--green); }

  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    padding: 0.85rem 2rem;
    border: none;
    border-radius: 12px;
    font-family: 'Fredoka', sans-serif;
    font-size: 1.05rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    color: white;
  }

  .btn:hover { transform: translateY(-2px); filter: brightness(1.1); }
  .btn:active { transform: translateY(0); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; filter: none; }

  .btn-primary {
    background: linear-gradient(135deg, var(--green), var(--green-dark));
    margin-top: 1.2rem;
    width: 100%;
  }

  .game-screen {
    display: none;
    min-height: 100vh;
    background: 
      radial-gradient(ellipse at 15% 85%, rgba(46,204,113,0.06) 0%, transparent 40%),
      radial-gradient(ellipse at 85% 15%, rgba(52,152,219,0.06) 0%, transparent 40%),
      var(--bg);
  }

  .game-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1rem 1.5rem;
    background: var(--bg-light);
    border-bottom: 1px solid rgba(255,255,255,0.05);
    flex-wrap: wrap;
    gap: 0.75rem;
  }

  .game-title {
    font-family: 'Fredoka', sans-serif;
    font-size: 1.3rem;
    background: linear-gradient(135deg, var(--green), var(--blue));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .player-scores {
    display: flex;
    gap: 1rem;
    flex-wrap: wrap;
  }

  .player-score {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.4rem 0.9rem;
    border-radius: 20px;
    background: rgba(255,255,255,0.05);
    font-size: 0.85rem;
    font-weight: 700;
    transition: all 0.3s;
  }

  .player-score.active {
    background: rgba(255,255,255,0.12);
    box-shadow: 0 0 12px rgba(46,204,113,0.2);
  }

  .player-score .mini-dot {
    width: 12px; height: 12px;
    border-radius: 50%;
  }

  .board-container {
    padding: 1.5rem;
    display: flex;
    justify-content: center;
    overflow-x: auto;
  }

  .board {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 8px;
    max-width: 680px;
    width: 100%;
  }

  .cell {
    aspect-ratio: 1;
    border-radius: 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-size: 0.7rem;
    font-weight: 700;
    position: relative;
    cursor: default;
    transition: all 0.3s;
    border: 2px solid transparent;
    padding: 4px;
    min-height: 70px;
  }

  .cell .cell-num { font-family: 'Fredoka', sans-serif; font-size: 1rem; opacity: 0.9; }
  .cell .cell-icon { font-size: 1.3rem; margin-bottom: 2px; }
  .cell .cell-label { font-size: 0.55rem; text-transform: uppercase; letter-spacing: 0.5px; opacity: 0.75; text-align: center; line-height: 1.2; }

  .cell-env { background: rgba(46,204,113,0.15); border-color: rgba(46,204,113,0.25); }
  .cell-social { background: rgba(52,152,219,0.15); border-color: rgba(52,152,219,0.25); }
  .cell-community { background: rgba(232,67,147,0.15); border-color: rgba(232,67,147,0.25); }
  .cell-digital { background: rgba(108,92,231,0.15); border-color: rgba(108,92,231,0.25); }
  .cell-event { background: rgba(230,126,34,0.15); border-color: rgba(230,126,34,0.25); }
  .cell-start { background: rgba(241,196,15,0.2); border-color: rgba(241,196,15,0.4); }
  .cell-goal { background: linear-gradient(135deg, rgba(46,204,113,0.25), rgba(52,152,219,0.25)); border-color: rgba(46,204,113,0.4); }

  .cell.highlight {
    box-shadow: 0 0 20px rgba(241,196,15,0.4);
    border-color: var(--yellow);
    transform: scale(1.05);
    z-index: 2;
  }

  .player-tokens { display: flex; gap: 3px; position: absolute; bottom: 3px; }

  .token {
    width: 14px; height: 14px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.6);
    box-shadow: 0 2px 6px rgba(0,0,0,0.4);
    transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .action-panel {
    max-width: 680px;
    margin: 0 auto;
    padding: 0 1.5rem 2rem;
  }

  .turn-info {
    text-align: center;
    padding: 1rem;
    font-family: 'Fredoka', sans-serif;
    font-size: 1.1rem;
  }

  .dice-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1rem;
    margin-bottom: 1.5rem;
  }

  .dice {
    width: 80px; height: 80px;
    background: var(--bg-card);
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Fredoka', sans-serif;
    font-size: 2.4rem;
    font-weight: 700;
    border: 2px solid rgba(255,255,255,0.1);
    transition: all 0.3s;
    user-select: none;
  }

  .dice.rolling { animation: diceRoll 0.5s ease; }

  @keyframes diceRoll {
    0%, 100% { transform: rotate(0deg) scale(1); }
    25% { transform: rotate(15deg) scale(1.1); }
    50% { transform: rotate(-10deg) scale(0.95); }
    75% { transform: rotate(5deg) scale(1.05); }
  }

  .btn-roll { background: linear-gradient(135deg, var(--orange), var(--orange-dark)); }

  .scenario-card {
    display: none;
    background: var(--bg-card);
    border-radius: var(--radius);
    padding: 1.5rem;
    border: 1px solid rgba(255,255,255,0.08);
    animation: cardIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(20px) scale(0.95); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  .scenario-card .category-badge {
    display: inline-block;
    padding: 0.3rem 0.8rem;
    border-radius: 8px;
    font-size: 0.75rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 0.75rem;
  }

  .badge-env { background: rgba(46,204,113,0.2); color: var(--green); }
  .badge-social { background: rgba(52,152,219,0.2); color: var(--blue); }
  .badge-community { background: rgba(232,67,147,0.2); color: var(--pink); }
  .badge-digital { background: rgba(108,92,231,0.2); color: var(--purple); }
  .badge-event { background: rgba(230,126,34,0.2); color: var(--orange); }

  .scenario-card h3 { font-family: 'Fredoka', sans-serif; font-size: 1.15rem; margin-bottom: 0.6rem; line-height: 1.4; }
  .scenario-card .story { color: var(--text-dim); line-height: 1.65; margin-bottom: 1.2rem; font-size: 0.92rem; }

  .choices { display: flex; flex-direction: column; gap: 0.6rem; }

  .choice-btn {
    width: 100%;
    text-align: left;
    padding: 0.9rem 1.1rem;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.08);
    background: var(--bg-light);
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    font-size: 0.9rem;
    cursor: pointer;
    transition: all 0.2s;
    line-height: 1.5;
  }

  .choice-btn:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.15); transform: translateX(4px); }
  .choice-btn.chosen-good { border-color: var(--green); background: rgba(46,204,113,0.12); }
  .choice-btn.chosen-ok { border-color: var(--yellow); background: rgba(241,196,15,0.1); }
  .choice-btn.chosen-bad { border-color: #e74c3c; background: rgba(231,76,60,0.1); }

  .result-text {
    display: none;
    margin-top: 1rem;
    padding: 1rem;
    border-radius: 12px;
    background: rgba(255,255,255,0.03);
    line-height: 1.6;
    font-size: 0.9rem;
  }

  .result-text .points-change { font-family: 'Fredoka', sans-serif; font-size: 1.3rem; margin-top: 0.5rem; }

  .btn-next { background: linear-gradient(135deg, var(--blue), var(--blue-dark)); margin-top: 1rem; width: 100%; }

  .win-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(15,25,35,0.95);
    z-index: 100;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 2rem;
    animation: fadeIn 0.5s ease;
  }

  .win-overlay .trophy { font-size: 5rem; margin-bottom: 1rem; }

  .win-overlay h2 {
    font-family: 'Fredoka', sans-serif;
    font-size: 2.5rem;
    background: linear-gradient(135deg, var(--yellow), var(--orange));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 0.5rem;
  }

  .win-overlay p { color: var(--text-dim); max-width: 400px; line-height: 1.7; margin-bottom: 1.5rem; }

  .final-scores { display: flex; gap: 1.5rem; margin-bottom: 2rem; flex-wrap: wrap; justify-content: center; }

  .final-score-card {
    background: var(--bg-card);
    border-radius: var(--radius);
    padding: 1.2rem 1.8rem;
    text-align: center;
    border: 1px solid rgba(255,255,255,0.06);
  }

  .final-score-card .name { font-family: 'Fredoka', sans-serif; font-size: 0.95rem; margin-bottom: 0.3rem; }
  .final-score-card .score { font-family: 'Fredoka', sans-serif; font-size: 2rem; font-weight: 700; }

  .btn-restart { background: linear-gradient(135deg, var(--green), var(--green-dark)); }

  .impact-goal { text-align: center; padding: 0.5rem; font-size: 0.85rem; color: var(--text-dim); }
  .impact-goal strong { color: var(--yellow); }

  .pool-info {
    text-align: center;
    font-size: 0.7rem;
    color: rgba(255,255,255,0.2);
    padding: 0.3rem;
  }

  @media (max-width: 600px) {
    .board { grid-template-columns: repeat(5, 1fr); gap: 5px; }
    .cell { min-height: 58px; border-radius: 10px; }
    .cell .cell-icon { font-size: 1.1rem; }
    .cell .cell-num { font-size: 0.85rem; }
    .cell .cell-label { display: none; }
    .game-header { padding: 0.8rem 1rem; }
  }
</style>
</head>
<body>

<div class="intro-screen" id="introScreen">
  <h1>🌍 Changemaker</h1>
  <p class="subtitle">Zeig, dass du durch eigenes Handeln die Welt verändern kannst. Triff Entscheidungen, sammle Impact-Punkte und werde zum Changemaker!</p>
  <div class="player-setup">
    <h3>Wer spielt mit?</h3>
    <div class="player-input-row">
      <div class="dot" style="background:var(--green)"></div>
      <input type="text" id="p1name" placeholder="Spieler 1" maxlength="15">
    </div>
    <div class="player-input-row">
      <div class="dot" style="background:var(--blue)"></div>
      <input type="text" id="p2name" placeholder="Spieler 2" maxlength="15">
    </div>
    <div class="player-input-row">
      <div class="dot" style="background:var(--pink)"></div>
      <input type="text" id="p3name" placeholder="Spieler 3 (optional)" maxlength="15">
    </div>
    <div class="player-input-row">
      <div class="dot" style="background:var(--purple)"></div>
      <input type="text" id="p4name" placeholder="Spieler 4 (optional)" maxlength="15">
    </div>
    <button class="btn btn-primary" onclick="startGame()">🎲 Spiel starten!</button>
  </div>
</div>

<div class="game-screen" id="gameScreen">
  <div class="game-header">
    <div class="game-title">🌍 Changemaker</div>
    <div class="player-scores" id="playerScores"></div>
  </div>
  <div class="impact-goal" id="impactGoal"></div>
  <div class="board-container">
    <div class="board" id="board"></div>
  </div>
  <div class="action-panel">
    <div class="turn-info" id="turnInfo"></div>
    <div class="dice-area" id="diceArea">
      <div class="dice" id="dice">?</div>
      <button class="btn btn-roll" id="rollBtn" onclick="rollDice()">🎲 Würfeln</button>
    </div>
    <div class="scenario-card" id="scenarioCard">
      <div class="category-badge" id="scenBadge"></div>
      <h3 id="scenTitle"></h3>
      <p class="story" id="scenStory"></p>
      <div class="choices" id="scenChoices"></div>
      <div class="result-text" id="resultText"></div>
      <button class="btn btn-next" id="nextBtn" onclick="nextTurn()" style="display:none">Weiter →</button>
    </div>
    <div class="pool-info" id="poolInfo"></div>
  </div>
</div>

<div class="win-overlay" id="winOverlay">
  <div class="trophy">🏆</div>
  <h2 id="winnerName"></h2>
  <p id="winMessage"></p>
  <div class="final-scores" id="finalScores"></div>
  <button class="btn btn-restart" onclick="location.reload()">🔄 Nochmal spielen</button>
</div>

<script>
const COLORS = ['#2ecc71','#3498db','#e84393','#6c5ce7'];
const WIN_SCORE = 30;

// ============================================================
// MASSIVE SCENARIO DATABASE — 15+ per category = 80+ total
// ============================================================
const SCENARIOS = {
env: [
  { title:'Plastik am Flussufer', story:'Du siehst beim Spaziergang am Fluss jede Menge Plastikmüll liegen. Die Strömung trägt es bald ins Meer.', choices:[
    { text:'🧤 Du organisierst einen Clean-Up mit Freunden und postest Vorher-Nachher-Bilder', points:4, feedback:'Fantastisch! 15 Leute kamen und ihr habt 3 Säcke Müll gesammelt. Die Posts inspirierten andere Gruppen!', level:'good' },
    { text:'🗑️ Du sammelst den Müll allein auf, so viel du tragen kannst', points:2, feedback:'Gut gemacht! Jede einzelne Aktion zählt.', level:'ok' },
    { text:'📸 Du machst ein Foto und gehst weiter – „da muss die Stadt ran"', points:0, feedback:'Das Foto verstaubt auf deinem Handy. Manchmal braucht es mehr als Dokumentation.', level:'bad' }
  ]},
  { title:'Einwegbecher in der Schulcafeteria', story:'Die Schulcafeteria plant, auf billige Einwegbecher umzusteigen. Tausende Becher Müll pro Monat drohen.', choices:[
    { text:'📝 Du startest eine Petition und präsentierst der Schulleitung Alternativen', points:4, feedback:'Die Schulleitung war beeindruckt! Ab nächstem Monat gibt es ein Pfandbechersystem.', level:'good' },
    { text:'☕ Du bringst einfach deinen eigenen Becher mit', points:2, feedback:'Ein guter Anfang! Einige Mitschüler machen es dir nach.', level:'ok' },
    { text:'🤷 Ist ja nicht dein Problem, du trinkst eh keinen Kaffee', points:-1, feedback:'Manchmal geht es nicht nur um einen selbst, sondern um die Gemeinschaft.', level:'bad' }
  ]},
  { title:'Radweg oder Parkplatz?', story:'In deiner Straße soll ein neuer Parkplatz gebaut werden. Es gibt aber auch den Vorschlag für einen sicheren Radweg.', choices:[
    { text:'🚲 Du sammelst Unterschriften für den Radweg und sprichst mit dem Stadtrat', points:4, feedback:'Der Stadtrat hat zugehört! Ein temporärer Radweg wird als Pilotprojekt gestartet.', level:'good' },
    { text:'💬 Du postest in der Nachbarschaftsgruppe über die Vorteile des Radwegs', points:2, feedback:'Gute Diskussion! Die Meinungen sind geteilt, aber das Thema ist auf dem Tisch.', level:'ok' },
    { text:'🅿️ Dir ist egal – deine Eltern brauchen eh den Parkplatz', points:-1, feedback:'Kurzfristig praktisch, aber langfristig profitiert die ganze Nachbarschaft von sicheren Radwegen.', level:'bad' }
  ]},
  { title:'Bienen in Gefahr', story:'Im Biologieunterricht lernst du, dass die Bienenpopulation dramatisch sinkt. Dein Schulhof ist eine Betonwüste.', choices:[
    { text:'🌻 Du startest ein Schulprojekt für bienenfreundliche Blumenbeete', points:4, feedback:'Im Frühling summt es überall! Das Projekt wurde sogar in der Lokalzeitung vorgestellt.', level:'good' },
    { text:'🪴 Du pflanzt auf dem Balkon bienenfreundliche Blumen', points:2, feedback:'Klein aber wirkungsvoll – dein Balkon wird zum Mini-Biotop!', level:'ok' },
    { text:'😴 Bienen sind gruselig, sollen die halt woanders hin', points:-1, feedback:'Ohne Bienen keine Äpfel, Erdbeeren oder Schokolade... vielleicht nochmal drüber nachdenken?', level:'bad' }
  ]},
  { title:'Fast Fashion Haul', story:'Deine Freundin zeigt dir stolz 20 neue Teile für 30 Euro von einem Online-Billigshop. Alles Wegwerfmode.', choices:[
    { text:'👗 Du lädst sie zu einem Kleidertausch-Event ein und zeigst Second-Hand-Alternativen', points:4, feedback:'Sie ist begeistert vom Kleidertausch! Drei andere Freundinnen machen jetzt auch mit.', level:'good' },
    { text:'💬 Du erklärst ihr freundlich, wie Fast Fashion die Umwelt belastet', points:2, feedback:'Sie hört zu und verspricht, beim nächsten Mal bewusster einzukaufen.', level:'ok' },
    { text:'🛒 Du bestellst gleich selbst – so billig!', points:-1, feedback:'Billig im Preis, teuer für den Planeten. 92 Millionen Tonnen Textilmüll entstehen pro Jahr.', level:'bad' }
  ]},
  { title:'Licht aus oder an?', story:'In deiner Schule brennen nachts in allen Klassenzimmern die Lichter. Das fällt dir auf dem Heimweg auf.', choices:[
    { text:'💡 Du sprichst den Hausmeister an und schlägst Bewegungsmelder und Zeitschaltuhren vor', points:4, feedback:'Die Schule spart 2.000 Euro im Jahr an Stromkosten und 3 Tonnen CO₂!', level:'good' },
    { text:'📧 Du schreibst eine Mail an die Schulleitung', points:2, feedback:'Guter Impuls! Das Thema kommt auf die Agenda der nächsten Konferenz.', level:'ok' },
    { text:'🌙 Ist halt so – Schulen sind halt beleuchtet', points:0, feedback:'Unnötiger Energieverbrauch ist vermeidbar. Jede Kilowattstunde zählt.', level:'bad' }
  ]},
  { title:'Wasserverschwendung im Sportunterricht', story:'Nach dem Sportunterricht lassen viele die Duschen minutenlang laufen, ohne darunter zu stehen.', choices:[
    { text:'🚿 Du schlägst dem Sportlehrer Schilder mit Spar-Tipps und kürzere Duschzeiten vor', points:4, feedback:'Die Schilder hängen und der Wasserverbrauch sinkt um 30%!', level:'good' },
    { text:'💧 Du drehst die leerlaufenden Duschen selbst ab', points:2, feedback:'Direkte Aktion! Manche rollen die Augen, aber du sparst hunderte Liter.', level:'ok' },
    { text:'🤷 Ist ja nicht dein Wasser', points:-1, feedback:'Trinkwasser ist kostbar – weltweit haben 2 Milliarden Menschen keinen sicheren Zugang.', level:'bad' }
  ]},
  { title:'Die Schulreise mit dem Flugzeug?', story:'Eure Klasse plant eine Klassenfahrt. Der Lehrer schlägt einen Kurzstreckenflug nach München vor – es gäbe auch den Zug.', choices:[
    { text:'🚂 Du recherchierst die Zugverbindung und rechnest den CO₂-Vergleich vor', points:4, feedback:'Die Klasse stimmt für den Zug! Die Zugfahrt wird zum halben Abenteuer.', level:'good' },

    { text:'🤝 Du schlägst eine Zusammenarbeit vor – gemeinsam seid ihr stärker', points:3, feedback:'Das fusionierte Projekt ist doppelt so wirkungsvoll! Kooperation schlägt Konkurrenz.', level:'good' },
    { text:'😤 Du beschwerst dich bei der Lehrerin über die „Kopie"', points:-1, feedback:'Veränderung ist kein Wettbewerb. Je mehr mitmachen, desto besser!', level:'bad' }
  ]},
  { title:'💡 Einladung ins Rathaus', story:'Der Bürgermeister lädt Jugendliche ein, Ideen für die Stadt einzubringen.', choices:[
    { text:'🏛️ Du gehst hin, bringst konkrete Vorschläge mit Daten und Bildern', points:4, feedback:'Zwei deiner Vorschläge werden umgesetzt! Junge Stimmen werden ernst genommen.', level:'good' },
    { text:'🗳️ Du gehst hin und hörst zu', points:1, feedback:'Gut, dass du da warst! Aber nächstes Mal: eigene Ideen einbringen.', level:'ok' }
  ]}
]
};

// ============================================================
// SMART NO-REPEAT QUESTION SYSTEM
// ============================================================
let questionPools = {};  // shuffled arrays per type
let usedCounts = {};     // track how many used per type

function initQuestionPools() {
  questionPools = {};
  usedCounts = {};
  for (const type in SCENARIOS) {
    questionPools[type] = shuffle([...Array(SCENARIOS[type].length).keys()]);
    usedCounts[type] = 0;
  }
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function getNextScenario(type) {
  if (!questionPools[type] || usedCounts[type] >= questionPools[type].length) {
    // All questions used — reshuffle
    questionPools[type] = shuffle([...Array(SCENARIOS[type].length).keys()]);
    usedCounts[type] = 0;
  }
  const idx = questionPools[type][usedCounts[type]];
  usedCounts[type]++;
  return SCENARIOS[type][idx];
}

function getTotalQuestions() {
  let total = 0;
  for (const type in SCENARIOS) total += SCENARIOS[type].length;
  return total;
}

function getUsedQuestions() {
  let total = 0;
  for (const type in usedCounts) total += usedCounts[type];
  return total;
}


// ============================================================
// GAME STATE
// ============================================================
const COLORS_LIST = ['#2ecc71','#3498db','#e84393','#6c5ce7'];

const FIELDS = [
  { type:'start', icon:'🏁', label:'Start' },
  { type:'env', icon:'🌱', label:'Umwelt' },
  { type:'social', icon:'🤝', label:'Soziales' },
  { type:'community', icon:'🏘️', label:'Gemeinde' },
  { type:'digital', icon:'📱', label:'Digital' },
  { type:'event', icon:'⚡', label:'Event' },
  { type:'env', icon:'♻️', label:'Recycling' },
  { type:'social', icon:'💬', label:'Respekt' },
  { type:'community', icon:'🎨', label:'Kultur' },
  { type:'env', icon:'🚲', label:'Mobilität' },
  { type:'digital', icon:'🛡️', label:'Sicherheit' },
  { type:'event', icon:'🌟', label:'Chance' },
  { type:'social', icon:'📚', label:'Bildung' },
  { type:'community', icon:'🌳', label:'Garten' },
  { type:'env', icon:'💧', label:'Wasser' },
  { type:'digital', icon:'🧠', label:'KI-Ethik' },
  { type:'social', icon:'❤️', label:'Empathie' },
  { type:'event', icon:'🎯', label:'Spezial' },
  { type:'community', icon:'🗳️', label:'Mitsprache' },
  { type:'env', icon:'🐝', label:'Tierschutz' },
  { type:'digital', icon:'📢', label:'Aktivismus' },
  { type:'social', icon:'🏳️‍🌈', label:'Vielfalt' },
  { type:'event', icon:'🔥', label:'Rückschlag' },
  { type:'community', icon:'🍽️', label:'Teilen' },
  { type:'env', icon:'☀️', label:'Energie' },
  { type:'social', icon:'👂', label:'Zuhören' },
  { type:'digital', icon:'💡', label:'Innovation' },
  { type:'goal', icon:'🌍', label:'Ziel' }
];

let players = [];
let currentPlayer = 0;
let positions = [];
let scores = [];
let gameActive = false;

function startGame() {
  const names = [
    document.getElementById('p1name').value.trim() || 'Spieler 1',
    document.getElementById('p2name').value.trim() || 'Spieler 2',
    document.getElementById('p3name').value.trim(),
    document.getElementById('p4name').value.trim()
  ].filter(n => n);

  if (names.length < 2) {
    names.length = 0;
    names.push('Spieler 1', 'Spieler 2');
  }

  players = names.map((name, i) => ({ name, color: COLORS_LIST[i] }));
  positions = players.map(() => 0);
  scores = players.map(() => 0);
  currentPlayer = 0;
  gameActive = true;

  initQuestionPools();

  document.getElementById('introScreen').style.display = 'none';
  document.getElementById('gameScreen').style.display = 'block';

  buildBoard();
  updateUI();
}

function buildBoard() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  FIELDS.forEach((field, i) => {
    const cell = document.createElement('div');
    cell.className = `cell cell-${field.type}`;
    cell.id = `cell-${i}`;
    cell.innerHTML = `
      <span class="cell-icon">${field.icon}</span>
      <span class="cell-num">${i}</span>
      <span class="cell-label">${field.label}</span>
      <div class="player-tokens" id="tokens-${i}"></div>
    `;
    board.appendChild(cell);
  });
  renderTokens();
}

function renderTokens() {
  FIELDS.forEach((_, i) => {
    const c = document.getElementById(`tokens-${i}`);
    if (c) c.innerHTML = '';
  });
  positions.forEach((pos, pi) => {
    const c = document.getElementById(`tokens-${pos}`);
    if (c) {
      const t = document.createElement('div');
      t.className = 'token';
      t.style.background = players[pi].color;
      c.appendChild(t);
    }
  });
}

function updateUI() {
  const scoresEl = document.getElementById('playerScores');
  scoresEl.innerHTML = players.map((p, i) => `
    <div class="player-score ${i === currentPlayer ? 'active' : ''}">
      <div class="mini-dot" style="background:${p.color}"></div>
      ${p.name}: <strong>${scores[i]}</strong>⭐
    </div>
  `).join('');

  document.getElementById('impactGoal').innerHTML = `Ziel: <strong>${WIN_SCORE} Impact-Punkte</strong> ⭐`;

  const p = players[currentPlayer];
  document.getElementById('turnInfo').innerHTML = `<span style="color:${p.color}">${p.name}</span> ist dran!`;

  document.querySelectorAll('.cell').forEach(c => c.classList.remove('highlight'));
  const cc = document.getElementById(`cell-${positions[currentPlayer]}`);
  if (cc) cc.classList.add('highlight');

  document.getElementById('diceArea').style.display = 'flex';
  document.getElementById('scenarioCard').style.display = 'none';
  document.getElementById('rollBtn').disabled = false;

  // Pool info
  document.getElementById('poolInfo').textContent = `Fragenlager: ${getUsedQuestions()} von ${getTotalQuestions()} Szenarien gespielt`;
}

function rollDice() {
  const btn = document.getElementById('rollBtn');
  const diceEl = document.getElementById('dice');
  btn.disabled = true;
  diceEl.classList.add('rolling');

  let rolls = 0;
  const interval = setInterval(() => {
    diceEl.textContent = Math.floor(Math.random() * 6) + 1;
    rolls++;
    if (rolls > 8) {
      clearInterval(interval);
      const result = Math.floor(Math.random() * 6) + 1;
      diceEl.textContent = result;
      diceEl.classList.remove('rolling');
      movePlayer(result);
    }
  }, 80);
}

function movePlayer(steps) {
  const maxPos = FIELDS.length - 1;
  let newPos = Math.min(positions[currentPlayer] + steps, maxPos);
  positions[currentPlayer] = newPos;
  renderTokens();

  document.querySelectorAll('.cell').forEach(c => c.classList.remove('highlight'));
  const cell = document.getElementById(`cell-${newPos}`);
  if (cell) cell.classList.add('highlight');

  if (newPos >= maxPos) {
    scores[currentPlayer] += 5;
    positions[currentPlayer] = 0;
    renderTokens();
  }

  setTimeout(() => showScenario(), 600);
}

function showScenario() {
  const pos = positions[currentPlayer];
  const field = FIELDS[pos];
  const type = field.type;

  if (type === 'start' || type === 'goal') {
    nextTurn();
    return;
  }

  if (!SCENARIOS[type]) {
    nextTurn();
    return;
  }

  const scenario = getNextScenario(type);

  document.getElementById('diceArea').style.display = 'none';
  const card = document.getElementById('scenarioCard');
  card.style.display = 'block';
  card.style.animation = 'none';
  card.offsetHeight;
  card.style.animation = 'cardIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1)';

  const badgeLabels = { env:'🌱 Umwelt', social:'🤝 Soziales', community:'🏘️ Gemeinschaft', digital:'📱 Digital', event:'⚡ Event' };

  document.getElementById('scenBadge').className = `category-badge badge-${type}`;
  document.getElementById('scenBadge').textContent = badgeLabels[type] || type;
  document.getElementById('scenTitle').textContent = scenario.title;
  document.getElementById('scenStory').textContent = scenario.story;

  const choicesEl = document.getElementById('scenChoices');
  choicesEl.innerHTML = '';
  document.getElementById('resultText').style.display = 'none';
  document.getElementById('nextBtn').style.display = 'none';

  scenario.choices.forEach((choice, i) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = choice.text;
    btn.onclick = () => makeChoice(scenario, i);
    choicesEl.appendChild(btn);
  });
}

function makeChoice(scenario, choiceIndex) {
  const choice = scenario.choices[choiceIndex];
  const buttons = document.querySelectorAll('.choice-btn');

  buttons.forEach((btn, i) => {
    btn.disabled = true;
    btn.style.cursor = 'default';
    btn.style.opacity = i === choiceIndex ? '1' : '0.4';
    if (i === choiceIndex) btn.classList.add(`chosen-${choice.level}`);
  });

  scores[currentPlayer] += choice.points;
  if (scores[currentPlayer] < 0) scores[currentPlayer] = 0;

  document.getElementById('playerScores').innerHTML = players.map((p, i) => `
    <div class="player-score ${i === currentPlayer ? 'active' : ''}">
      <div class="mini-dot" style="background:${p.color}"></div>
      ${p.name}: <strong>${scores[i]}</strong>⭐
    </div>
  `).join('');

  const resultEl = document.getElementById('resultText');
  const pointsColor = choice.points > 0 ? 'var(--green)' : choice.points < 0 ? '#e74c3c' : 'var(--yellow)';
  const pointsText = choice.points > 0 ? `+${choice.points}` : choice.points;
  resultEl.innerHTML = `${choice.feedback}<div class="points-change" style="color:${pointsColor}">${pointsText} Impact-Punkte</div>`;
  resultEl.style.display = 'block';
  document.getElementById('nextBtn').style.display = 'block';

  document.getElementById('poolInfo').textContent = `Fragenlager: ${getUsedQuestions()} von ${getTotalQuestions()} Szenarien gespielt`;

  if (scores[currentPlayer] >= WIN_SCORE) {
    setTimeout(() => showWin(), 800);
  }
}

function nextTurn() {
  currentPlayer = (currentPlayer + 1) % players.length;
  updateUI();
}

function showWin() {
  const winner = players[currentPlayer];
  document.getElementById('winOverlay').style.display = 'flex';
  document.getElementById('winnerName').textContent = `${winner.name} gewinnt!`;
  document.getElementById('winMessage').textContent = `Mit ${scores[currentPlayer]} Impact-Punkten hast du gezeigt: Jede Entscheidung zählt. Du bist ein echter Changemaker! 🌍`;

  const sorted = players.map((p, i) => ({ ...p, score: scores[i] })).sort((a, b) => b.score - a.score);
  document.getElementById('finalScores').innerHTML = sorted.map(p => `
    <div class="final-score-card">
      <div class="name" style="color:${p.color}">${p.name}</div>
      <div class="score" style="color:${p.color}">${p.score}⭐</div>
    </div>
  `).join('');
}
</script>
